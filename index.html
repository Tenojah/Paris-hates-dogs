<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Dog Map Paris</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

#dashboard {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: white;
    padding: 12px;
    border-radius: 8px;
    width: 240px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

#map {
    height: 100vh;
    width: 100%;
}

button {
    width: 100%;
    margin-top: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="dashboard">
    <h3>🐕 Dog Map Paris</h3>

    <p>🟢 Dog friendly: <span id="countA">0</span></p>
    <p>🟡 Semi friendly: <span id="countB">0</span></p>
    <p>🔴 Not dog friendly: <span id="countC">0</span></p>

    <hr>

    <button onclick="toggle('A')">Toggle Dog Friendly</button>
    <button onclick="toggle('B')">Toggle Semi</button>
    <button onclick="toggle('C')">Toggle Not Friendly</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ---------------- MAP ----------------
const map = L.map('map').setView([48.8566, 2.3522], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ---------------- LAYERS ----------------
const layers = {
    A: L.layerGroup().addTo(map),
    B: L.layerGroup().addTo(map),
    C: L.layerGroup().addTo(map)
};

// ---------------- STRICT TAXONOMY ----------------
function classify(p) {

    const isRoad = p.type === "voirie" || p.type === "terre_plein" || p.type === "mail";
    const hasPlayground = p.aire_de_jeux === true;
    const hasDogZone = p.zone_canin === true;
    const restricted = p.restrictions_fortes === true;
    const allowed = p.chien_autorise === true;

    // 🔴 RULE 1: playground = ALWAYS NOT DOG FRIENDLY
    if (hasPlayground) return "C";

    // 🔴 RULE 2: road / decorative spaces
    if (isRoad) return "C";

    // 🟡 RULE 3: constrained spaces
    if (restricted) return "B";

    // 🟢 RULE 4: dog allowed or dog zone
    if (allowed || hasDogZone) return "A";

    // 🔴 default fallback
    return "C";
}

// ---------------- COLORS ----------------
function color(cat) {
    return {
        A: "#2ecc71",
        B: "#f39c12",
        C: "#e74c3c"
    }[cat];
}

// ---------------- DATA FETCH ----------------
fetch("https://opendata.paris.fr/api/records/1.0/search/?dataset=espaces_verts&rows=5000")
.then(r => r.json())
.then(data => {

    data.records.forEach(r => {

        if (!r.geometry) return;

        const p = r.fields;
        const cat = classify(p);

        const coords = [
            r.geometry.coordinates[1],
            r.geometry.coordinates[0]
        ];

        const marker = L.circleMarker(coords, {
            radius: 5,
            color: color(cat),
            fillColor: color(cat),
            fillOpacity: 0.75
        });

        marker.bindPopup(`
            <b>${p.nom || "Sans nom"}</b><br>
            Catégorie : ${cat}
        `);

        layers[cat].addLayer(marker);
    });

    updateStats();
});

// ---------------- DASHBOARD ----------------
function updateStats() {
    document.getElementById("countA").innerText = layers.A.getLayers().length;
    document.getElementById("countB").innerText = layers.B.getLayers().length;
    document.getElementById("countC").innerText = layers.C.getLayers().length;
}

// ---------------- TOGGLE ----------------
function toggle(cat) {
    if (map.hasLayer(layers[cat])) {
        map.removeLayer(layers[cat]);
    } else {
        map.addLayer(layers[cat]);
    }
}

</script>

</body>
</html>
